  version: 0.1

workcell: /home/rpl/workspace/rpl_workcell/bio_workcell/bio_workcell.yaml

modules:
  - name: liconic

flowdef:
  - name: Move tip bin from Solo Position3 to Stack 1
    module: plateCrane
    command: transfer
    args:
      source: "Solo.Position3"
      target: "Stack1"
      source_type: "stack"
      target_type: "module"
      plate_type: "tip_box_lid_off"
    checks: null
    comment: Place plate in Solo Position4
