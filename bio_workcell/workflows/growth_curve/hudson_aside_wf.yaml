metadata:
  name: PCR - Workflow
  author: Alp Demirtas
  info: Initial PCR workflow for RPL workcell
  version: 0.1

workcell: /home/rpl/workspace/BIO_workcell/bio_workcell/bio_workcell.yaml

modules:
  - name: solo
  - name: peeler
  - name: sealer
  - name: plateEx
  - name: camera

flowdef:
  - name: Move plate from Solo Position4 to Lid Nest 1
    module: plateCrane
    command: transfer
    args:
      source: "Solo.Position4"
      target: "LidNest1"
      source_type: "stack"
      target_type: "module"
      plate_type: "96_well"
    checks: null
    comment: Place plate in Solo Position4
